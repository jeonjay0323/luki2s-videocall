<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUKI2DS — ENTER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;height:100%;background:#0a0612;overflow:hidden;}
  #warp{display:block;position:fixed;inset:0;}
  #fade{position:fixed;inset:0;background:#000;opacity:0;pointer-events:none;z-index:3;transition:opacity .1s linear;}
  /* loading 디자인(figma 71:2362): 좌하단 워드마크 + CONNECTING... */
  .loading{position:fixed;left:40px;bottom:40px;z-index:2;display:flex;gap:40px;align-items:flex-end;pointer-events:none;}
  .loading .wordmark{width:434px;height:120px;display:block;}
  /* 히어로 로고처럼 일부 획만 깜빡임 */
  .loading .wordmark .flick{animation-name:flicker;animation-iteration-count:infinite;animation-timing-function:linear;will-change:opacity;}
  @keyframes flicker{
    0%,37%,100%{opacity:1;}
    39%{opacity:0.1;}
    41%{opacity:1;}
    43%{opacity:0.15;}
    45%{opacity:1;}
    70%{opacity:1;}
    72%{opacity:0;}
    75%{opacity:1;}
  }
  @media (prefers-reduced-motion:reduce){.loading .wordmark .flick{animation:none;}}
  .loading .status{font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:32px;line-height:1.2;
    letter-spacing:-0.32px;text-transform:uppercase;color:#fff;white-space:nowrap;}
  .back{position:fixed;left:24px;top:20px;z-index:2;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    font-size:14px;letter-spacing:-0.14px;text-transform:uppercase;color:rgba(255,255,255,.7);text-decoration:none;}
  .back:hover{color:#fff;}
</style>
</head>
<body>
  <canvas id="warp"></canvas>
  <div class="loading">
    <svg class="wordmark" viewBox="0 0 434 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="LUKI2S">
      <g clip-path="url(#clipLoad)">
        <path d="M162.891 48.0992H135.836V119.504H162.891V48.0992Z" fill="#fff" stroke="#fff" stroke-miterlimit="10"/>
        <path d="M162.891 0.495868H135.836V36.1983H162.891V0.495868Z" fill="#fff" stroke="#fff" stroke-miterlimit="10"/>
        <path d="M271.109 0.495868H244.055V119.504H271.109V0.495868Z" fill="#fff" stroke="#fff" stroke-miterlimit="10"/>
        <path class="flick" style="animation-duration:2.1s;animation-delay:0s" d="M95.2546 0.495868H81.7273V48.0992H95.2546V0.495868Z" fill="#fff" stroke="#fff" stroke-miterlimit="10"/>
        <path class="flick" style="animation-duration:1.9s;animation-delay:.2s" d="M95.2546 60H81.7273V107.603H95.2546V60Z" fill="#fff" stroke="#fff" stroke-miterlimit="10"/>
        <path d="M189.945 0.495868H176.418V119.504H189.945V0.495868Z" fill="#fff" stroke="#fff" stroke-miterlimit="10"/>
        <path d="M135.836 107.603H95.2545V119.504H135.836V107.603Z" fill="#fff" stroke="#fff" stroke-miterlimit="10"/>
        <path class="flick" style="animation-duration:3.3s;animation-delay:.6s" d="M203.473 48.0992H176.418V71.9008H203.473V48.0992Z" fill="#fff" stroke="#fff" stroke-miterlimit="10"/>
        <path d="M217 71.9008H203.473V95.7025H217V71.9008Z" fill="#fff" stroke="#fff" stroke-miterlimit="10"/>
        <path d="M230.527 0.495868H217V24.2975H230.527V0.495868Z" fill="#fff" stroke="#fff" stroke-miterlimit="10"/>

        <path class="flick" style="animation-duration:2.8s;animation-delay:.35s" d="M433.436 12.3967H419.909V24.2975H433.436V12.3967Z" fill="#fff" stroke="#fff" stroke-miterlimit="10"/>
        <path class="flick" style="animation-duration:2.6s;animation-delay:.7s" d="M298.164 119.504H284.636L311.691 60H325.218L298.164 119.504Z" fill="#fff" stroke="#fff" stroke-miterlimit="10"/>
        <path d="M352.273 12.3967H338.745V48.0992H352.273V12.3967Z" fill="#fff" stroke="#fff" stroke-miterlimit="10"/>
        <path class="flick" style="animation-duration:2.4s;animation-delay:1.9s" d="M379.327 12.3967H365.8V48.0992H379.327V12.3967Z" fill="#fff" stroke="#fff" stroke-miterlimit="10"/>
        <path d="M338.745 0.495868H298.164V12.3967H338.745V0.495868Z" fill="#fff" stroke="#fff" stroke-miterlimit="10"/>
        <path d="M419.909 0.495868H379.327V12.3967H419.909V0.495868Z" fill="#fff" stroke="#fff" stroke-miterlimit="10"/>
        <path class="flick" style="animation-duration:2.3s;animation-delay:.9s" d="M419.909 107.603H379.327V119.504H419.909V107.603Z" fill="#fff" stroke="#fff" stroke-miterlimit="10"/>
        <path d="M365.8 107.603H325.218V119.504H365.8V107.603Z" fill="#fff" stroke="#fff" stroke-miterlimit="10"/>
        <path d="M230.527 95.7025H217V119.504H230.527V95.7025Z" fill="#fff" stroke="#fff" stroke-miterlimit="10"/>
        <path d="M27.6182 0.495868H0.563636V119.504H27.6182V0.495868Z" fill="#fff" stroke="#fff" stroke-miterlimit="10"/>
        <path d="M41.1455 107.603H27.6182V119.504H41.1455V107.603Z" fill="#fff" stroke="#fff" stroke-miterlimit="10"/>
        <path class="flick" style="animation-duration:3.1s;animation-delay:1.5s" d="M68.2 107.603H54.6727V119.504H68.2V107.603Z" fill="#fff" stroke="#fff" stroke-miterlimit="10"/>
        <path d="M433.436 71.9008H419.909V107.603H433.436V71.9008Z" fill="#fff" stroke="#fff" stroke-miterlimit="10"/>
        <path class="flick" style="animation-duration:2.2s;animation-delay:.45s" d="M419.909 60H406.382V71.9008H419.909V60Z" fill="#fff" stroke="#fff" stroke-miterlimit="10"/>
      </g>
      <defs><clipPath id="clipLoad"><rect width="434" height="120" fill="#fff"/></clipPath></defs>
    </svg>
    <div class="status">connecting...</div>
  </div>
  <div id="fade"></div>
  <audio id="space" src="assets/space.mp3" preload="auto"></audio>
  <audio id="scream" src="assets/scream.mp3" preload="auto"></audio>
  <a class="back" href="index.html" aria-label="back">←</a>
  <script>
    // 스타워즈 하이퍼스페이스풍 "빨려들어가는" 워프 — 3색만 사용, 보랏빛 배경
    var cv=document.getElementById('warp'), ctx=cv.getContext('2d');
    var W,H,CX,CY,DPR;
    function resize(){
      DPR=Math.min(window.devicePixelRatio||1,2);
      W=cv.width=innerWidth*DPR; H=cv.height=innerHeight*DPR;
      cv.style.width=innerWidth+'px'; cv.style.height=innerHeight+'px';
      CX=W/2; CY=H/2;
    }
    resize();

    var PALETTE=[[215,215,47],[236,63,32],[83,123,165]]; // D7D72F / EC3F20 / 537BA5
    var SPEED=1.0;   // 전체 속도
    var COUNT=340;   // 선 개수
    function maxR(){return Math.hypot(CX,CY);}
    function rand(a,b){return a+Math.random()*(b-a);}
    function mkStar(fill){
      return {
        ang:Math.random()*Math.PI*2,
        r: fill? rand(0,maxR()) : rand(0,40),
        speed:rand(2,5),
        len:rand(24,100),
        c:PALETTE[(Math.random()*PALETTE.length)|0],
        w:rand(1,2.4)
      };
    }
    var stars=[];
    function init(){ stars=[]; for(var i=0;i<COUNT;i++) stars.push(mkStar(true)); }
    init();
    addEventListener('resize',function(){resize();init();});

    // 한 번 빨려들어가는 시퀀스: 가속 → 절규 → 페이드아웃 → 영상통화 화면 연결
    var t0=null, RAMP=5200, SCREAM_AT=4400, FADE_AT=5000, END=6300, DEST='call.html';
    var fade=document.getElementById('fade'), navigated=false;
    function frame(ts){
      var now=ts||0;
      if(t0===null) t0=now;
      var el=now-t0;
      var ramp=Math.min(1, el/RAMP);
      ramp=0.08 + 1.4*(ramp*ramp);              // 처음 8% → ease-in 가속(끝엔 더 빠르게)
      if(el>=SCREAM_AT) playScream();           // 끝날 때쯤 절규
      if(el>=FADE_AT) fade.style.opacity=Math.min(1,(el-FADE_AT)/(END-FADE_AT));
      if(el>=END && !navigated){ navigated=true; location.href=DEST; return; }
      ctx.fillStyle='rgba(10,6,18,0.28)';      // 트레일 페이드 (보랏빛)
      ctx.fillRect(0,0,W,H);
      var mr=maxR();
      for(var i=0;i<stars.length;i++){
        var s=stars[i], r0=s.r;
        s.r += (s.speed + s.r*0.045) * SPEED * DPR * ramp;   // 멀어질수록 가속
        var r1=s.r, ca=Math.cos(s.ang), sa=Math.sin(s.ang);
        var x0=CX+ca*r0, y0=CY+sa*r0;
        var x1=CX+ca*(r1+s.len*DPR), y1=CY+sa*(r1+s.len*DPR);
        var a=Math.min(1, r1/mr*1.2);                 // 멀수록 진하게
        ctx.strokeStyle='rgba('+s.c[0]+','+s.c[1]+','+s.c[2]+','+a.toFixed(3)+')';
        ctx.lineWidth=s.w*DPR*(0.4+a);
        ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x1,y1); ctx.stroke();
        if(r1>mr+s.len*DPR) stars[i]=mkStar(false);
      }
      requestAnimationFrame(frame);
    }
    frame();

    // 진입 시 절규 사운드 (autoplay 차단되면 첫 인터랙션에서 재생)
    // 진입 즉시: 우주 신비 효과음 2초 재생 후 페이드아웃
    var space=document.getElementById('space'), spaceStarted=false;
    function playSpace(){
      if(!space||spaceStarted) return;
      space.volume=1;
      var p=space.play();
      if(p&&p.then){ p.then(function(){ spaceStarted=true; setTimeout(fadeSpace,2000); }).catch(function(){}); }
      else { spaceStarted=true; setTimeout(fadeSpace,2000); }
    }
    function fadeSpace(){
      var iv=setInterval(function(){
        space.volume=Math.max(0,space.volume-0.05);
        if(space.volume<=0){ space.pause(); clearInterval(iv); }
      },45);
    }
    playSpace();

    // 절규: 타임라인(SCREAM_AT)에서 1회 재생. autoplay 차단 대비 첫 인터랙션 때 오디오 unlock.
    var scream=document.getElementById('scream'), screamed=false, unlocked=false;
    function playScream(){
      if(!scream||screamed) return;
      screamed=true;
      var p=scream.play(); if(p&&p.catch) p.catch(function(){ screamed=false; });
    }
    function unlock(){
      if(unlocked) return; unlocked=true;
      playSpace();
      if(scream){ scream.muted=true; var p=scream.play();
        if(p&&p.then) p.then(function(){ scream.pause(); scream.currentTime=0; scream.muted=false; }).catch(function(){ scream.muted=false; }); }
      ['pointerdown','keydown','touchstart'].forEach(function(e){window.removeEventListener(e,unlock);});
    }
    ['pointerdown','keydown','touchstart'].forEach(function(e){window.addEventListener(e,unlock);});
  </script>
</body>
</html>
