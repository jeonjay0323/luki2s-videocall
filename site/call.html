<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUKI2DS — 영상통화</title>
<style>
  @font-face{font-family:'Paperlogy';font-weight:400;font-display:swap;
    src:url('https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy/Paperlogy-4Regular.woff2') format('woff2');}
  @font-face{font-family:'Paperlogy';font-weight:700;font-display:swap;
    src:url('https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy/Paperlogy-7Bold.woff2') format('woff2');}

  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:#000;
    font-family:'Paperlogy',Pretendard,-apple-system,sans-serif;}
  body{display:flex;align-items:center;justify-content:center;}

  /* demo.html(워프)의 검정 페이드아웃을 그대로 이어받아 부드럽게 등장 */
  .card-stack{display:flex;flex-direction:column;gap:24px;align-items:flex-start;width:480px;
    opacity:0;transform:translateY(10px) scale(.985);
    animation:reveal .9s cubic-bezier(.22,.61,.36,1) .25s forwards;}
  @keyframes reveal{to{opacity:1;transform:none;}}
  @media (prefers-reduced-motion:reduce){.card-stack{animation:none;opacity:1;transform:none;}}

  /* 사진 카드 */
  .photo{width:100%;height:680px;border-radius:8px;overflow:hidden;background:#fff;position:relative;}
  .photo img,.photo video{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;}
  .photo video{display:none;}
  .photo.live img{display:none;}
  .photo.live video{display:block;}

  /* 정보 블록 */
  .info{display:flex;flex-direction:column;justify-content:space-between;height:96px;width:254px;}
  .info-name{display:flex;gap:8px;align-items:center;text-transform:uppercase;white-space:nowrap;}
  .info-name .name{font-weight:700;font-size:20px;line-height:1.1;color:#fff;}
  .info-name .handle{font-weight:400;font-size:14px;line-height:1.1;color:#8f8f8f;}

  .tags{display:flex;gap:8px;align-items:flex-start;}
  .tag{border:1px solid #fff;border-radius:999px;padding:4px 8px;
    font-weight:700;font-size:12px;line-height:1.1;color:#fff;text-transform:uppercase;white-space:nowrap;}

  .followers{display:flex;gap:6px;align-items:center;
    font-weight:400;font-size:14px;line-height:1.1;color:#8f8f8f;text-transform:uppercase;white-space:nowrap;}

  /* CONNECT 버튼 */
  .connect{width:100%;height:72px;border:none;border-radius:8px;cursor:pointer;
    display:flex;gap:8px;align-items:center;justify-content:center;
    /* 0% 위치에서 figma 그라디언트(D7D72F→EC3F20→537BA5) 그대로, 좌우로 흐름 */
    background:linear-gradient(104.48deg,#D7D72F 0%,#EC3F20 25%,#537BA5 50%,#EC3F20 75%,#D7D72F 100%);
    background-size:200% 100%;background-position:0% 50%;
    animation:gradFlow 6s ease-in-out infinite alternate;}
  @keyframes gradFlow{to{background-position:100% 50%;}}
  .connect:hover{animation-duration:3s;}
  .connect:disabled{cursor:default;opacity:.85;}
  @media (prefers-reduced-motion:reduce){.connect{animation:none;}}
  .connect span{font-weight:700;font-size:20px;line-height:1.1;color:#fff;text-transform:uppercase;}
  .connect img{width:24px;height:24px;display:block;}

  .back{position:fixed;left:24px;top:20px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    font-size:14px;letter-spacing:-0.14px;text-transform:uppercase;color:rgba(255,255,255,.5);text-decoration:none;}
  .back:hover{color:#fff;}
</style>
</head>
<body>
  <a class="back" href="index.html" aria-label="back">←</a>

  <div class="card-stack">
    <div class="photo">
      <img src="assets/trainee-cat.png" alt="">
      <video id="avatar" playsinline muted></video>
    </div>

    <div class="info">
      <div class="info-name">
        <span class="name">캣</span>
        <span class="handle">cat.9090</span>
      </div>
      <div class="tags">
        <span class="tag">연습생</span>
        <span class="tag">엘프</span>
      </div>
      <div class="followers">
        <span>팔로워</span>
        <span>$%$명</span>
      </div>
    </div>

    <button class="connect" type="button">
      <span>connect</span>
      <img src="assets/icon-connect.svg" alt="">
    </button>
  </div>

  <audio id="botAudio" autoplay></audio>

<script type="module">
import { PipecatClient } from "https://esm.sh/@pipecat-ai/client-js";
import { SmallWebRTCTransport } from "https://esm.sh/@pipecat-ai/small-webrtc-transport";

// 봇 서버 주소: ?bot=<url> 쿼리파라미터로 덮어쓸 수 있음.
// 기본값은 로컬 봇을 노출한 cloudflared 터널. 터널 주소가 바뀌면 여기만 갱신하거나 ?bot= 으로 지정.
const DEFAULT_BOT = "https://peak-privacy-surgeons-usual.trycloudflare.com";
const botBase = (new URLSearchParams(location.search).get("bot") || DEFAULT_BOT).replace(/\/$/, "");
const OFFER_URL = botBase + "/api/offer";

const btn   = document.querySelector('.connect');
const label = btn.querySelector('span');
const photo = document.querySelector('.photo');
const video = document.getElementById('avatar');
const audio = document.getElementById('botAudio');

let client = null;
let connected = false;
let busy = false;

const setLabel = (t) => { label.textContent = t; };

function reset() {
  connected = false; busy = false; client = null;
  photo.classList.remove('live');
  video.srcObject = null; audio.srcObject = null;
  btn.disabled = false; setLabel('connect');
}

btn.addEventListener('click', async () => {
  if (busy) return;
  if (connected) { busy = true; try { await client?.disconnect(); } catch {} reset(); return; }

  busy = true; btn.disabled = true; setLabel('connecting…');
  try {
    client = new PipecatClient({
      transport: new SmallWebRTCTransport({ connectionUrl: OFFER_URL }),
      enableMic: true,
      enableCam: false,
      callbacks: {
        onTrackStarted: (track, participant) => {
          if (participant && participant.local) return;
          if (track.kind === 'video') {
            video.srcObject = new MediaStream([track]);
            video.play().catch(() => {});
            photo.classList.add('live');
          }
          if (track.kind === 'audio') {
            audio.srcObject = new MediaStream([track]);
            audio.play().catch(() => {});
          }
        },
        onDisconnected: () => reset(),
      },
    });
    await client.connect();
    connected = true; busy = false; btn.disabled = false;
    setLabel('통화 종료');
  } catch (e) {
    console.error(e);
    reset();
    alert('연결 실패: ' + (e?.message || e));
  }
});
</script>
</body>
</html>
